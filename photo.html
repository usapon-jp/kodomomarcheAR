<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>フレームで写真 | こどもマルシェAR</title>
  <style>
    html, body {
      margin: 0;
      min-height: 100%;
      font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
      background: linear-gradient(180deg, #fff8f0, #f7eadf);
      color: #2b1b12;
    }
    .shell {
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 24px;
      box-sizing: border-box;
      text-align: center;
    }
    .card {
      width: min(100%, 420px);
      padding: 28px 24px;
      border-radius: 28px;
      background: rgba(255,255,255,0.92);
      box-shadow: 0 18px 36px rgba(116,82,48,0.18);
    }
    h1 { margin: 0 0 10px; font-size: 28px; }
    p { margin: 0 0 18px; line-height: 1.7; }
    .button {
      min-width: 220px;
      height: 54px;
      border: 0;
      border-radius: 999px;
      background: linear-gradient(180deg, #ffcf62, #f3a825);
      color: #6f3f12;
      font-size: 18px;
      font-weight: 900;
      box-shadow: 0 10px 20px rgba(150,95,22,0.22);
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="card">
      <h1>フレームで写真</h1>
      <p>次はここに、保存したフレームを重ねて写真をとる機能をつなげます。今は先にフレームを作って保存してください。</p>
      <button class="button" type="button" onclick="window.location.href='builder.html'">フレームをつくる</button>
    </div>
  </div>
</body>
</html>
