<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>こどもマルシェAR</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="appShell">
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <div id="status" class="statusPanel">
      <div id="statusText" class="statusTitle">カメラをつけて、ARフォトをはじめよう</div>
      <div class="statusBody">
        <p>アイテムをえらんで、じぶんだけのコーデをつくれます。</p>
        <p>右上のQRからアイテムをあつめられます。</p>
        <p>撮った写真はダウンロードファイルに保存されます。</p>
      </div>
      <button id="startButton" class="primaryButton" type="button">カメラをつける</button>
    </div>

    <header class="topBar">
      <button id="menuButton" class="ghostButton hiddenControl" type="button">アイテム</button>
      <button id="qrButton" class="ghostButton hiddenControl" type="button">QRを読む</button>
    </header>

    <div class="bottomBar">
      <button id="captureButton" class="captureButton hiddenControl" type="button" aria-label="しゃしんをとる" title="しゃしんをとる"></button>
      <button id="switchButton" class="iconButton hiddenControl" type="button" aria-label="カメラを切り替える" title="カメラを切り替える">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M9 5 6.5 7.5 9 10" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M15 14 17.5 16.5 15 19" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M7 7.5h6a4 4 0 0 1 4 4V12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M17 16.5h-6a4 4 0 0 1-4-4V12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M10 4h4l1.2 1.5H18a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-8a2 2 0 0 1 2-2h2.8L10 4Z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

    <aside id="pickerPanel" class="pickerPanel hiddenPanel" aria-hidden="true">
      <div class="panelHeader">
        <div>
          <div class="panelTitle">アイテムえらび</div>
          <div class="panelSubtitle">集めたアイテムからえらんでね</div>
        </div>
        <button id="closePickerButton" class="closeButton" type="button" aria-label="閉じる">×</button>
      </div>

      <section class="pickerSection">
        <div class="sectionTitle">顔アクセ</div>
        <div id="faceAccessoryOptions" class="optionGrid"></div>
      </section>

      <section class="pickerSection">
        <div class="sectionTitle">キャラ</div>
        <div id="characterOptions" class="optionGrid"></div>
      </section>

      <section class="pickerSection">
        <div class="sectionTitle">フレーム</div>
        <div id="frameOptions" class="optionGrid"></div>
      </section>

      <section class="pickerSection">
        <div class="sectionTitle">背景</div>
        <div id="backgroundOptions" class="optionGrid"></div>
      </section>

      <section class="pickerSection">
        <div class="sectionTitle">スタンプ</div>
        <div id="stampOptions" class="optionGrid"></div>
      </section>
    </aside>

    <div id="qrPanel" class="qrPanel hiddenPanel" aria-hidden="true">
      <video id="qrVideo" autoplay playsinline muted></video>
      <div class="qrOverlay">
        <div class="qrHeader">
          <div>
            <div class="panelTitle">QRを読む</div>
            <div class="panelSubtitle">会場のQRコードをかざしてね</div>
          </div>
          <button id="closeQrButton" class="closeButton lightButton" type="button" aria-label="閉じる">×</button>
        </div>
        <div class="qrGuide"></div>
        <div id="qrStatus" class="qrStatus">QRをよみとり中…</div>
      </div>
    </div>

    <div id="toast" class="toast" aria-live="polite"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
