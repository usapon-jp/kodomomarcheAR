<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ひよこリボン QRテスト</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <style>
    html, body {
      margin: 0;
      min-height: 100%;
      font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
      background: linear-gradient(180deg, #fff9f0, #ffe8d8);
      color: #6b3f19;
    }
    body {
      display: grid;
      place-items: center;
      padding: 24px;
      box-sizing: border-box;
    }
    .card {
      width: min(100%, 420px);
      padding: 28px 24px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 18px 38px rgba(145, 97, 44, 0.16);
      text-align: center;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }
    p {
      margin: 0 0 18px;
      line-height: 1.7;
      font-size: 16px;
    }
    #qrcode {
      display: flex;
      justify-content: center;
      margin: 0 auto 16px;
      padding: 14px;
      background: #fff;
      border-radius: 22px;
    }
    code {
      display: inline-block;
      padding: 8px 12px;
      border-radius: 999px;
      background: #fff3df;
      font-size: 15px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>ひよこリボン QR</h1>
    <p>この QR を読むと、花がついているひよこを解放するテストができます。</p>
    <div id="qrcode" aria-label="qr_chick_01 QRコード"></div>
    <code>qr_chick_01</code>
  </main>
  <script>
    new QRCode(document.getElementById("qrcode"), {
      text: "qr_chick_01",
      width: 280,
      height: 280,
      correctLevel: QRCode.CorrectLevel.H
    });
  </script>
</body>
</html>
